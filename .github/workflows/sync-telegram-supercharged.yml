name: sync-telegram-supercharged

on:
  schedule:
    - cron: "0 13 * * *"
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: sync-telegram-supercharged
  cancel-in-progress: false

jobs:
  sync:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Sync upstream
        id: sync
        run: ./scripts/sync-telegram-supercharged.sh | tee -a "$GITHUB_OUTPUT"

      - name: Commit and push if changed
        run: |
          if [[ -z "$(git status --porcelain)" ]]; then
            echo "No changes — exiting clean."
            exit 0
          fi
          git config user.name "blackpaw-sync-bot"
          git config user.email "noreply@blackpaw.studio"
          git add plugins/telegram-supercharged .claude-plugin/marketplace.json
          git commit -m "chore(telegram-supercharged): sync ${{ steps.sync.outputs.upstream_sha }}

          Upstream version: ${{ steps.sync.outputs.upstream_version }}
          Source: https://github.com/k1p1l0/claude-telegram-supercharged"
          git push origin HEAD:${{ github.ref_name }}
